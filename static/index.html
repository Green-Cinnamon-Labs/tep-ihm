<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEP IHM — Tennessee Eastman Process</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <span class="header-title">Tennessee Eastman Process</span>
        <span id="sim-time" class="header-info">t = --</span>
        <span id="plant-status" class="header-info status-tag">--</span>
        <span id="connection-status" class="header-info status-disconnected">desconectado</span>
    </header>

    <!-- ISD Banner (hidden by default) -->
    <div id="isd-banner" class="isd-banner" hidden>EMERGENCY SHUTDOWN (ISD)</div>

    <main>
        <!-- Row 1: Solver + Alarms -->
        <div class="row-split">
            <section id="solver-panel" class="panel panel-narrow">
                <h2>Solver</h2>
                <table id="solver-table" class="kv-table">
                    <tr><td>|dy/dt|</td><td id="solver-deriv">--</td></tr>
                    <tr><td>Status</td><td id="solver-status">--</td></tr>
                </table>
            </section>

            <section id="alarms-panel" class="panel panel-wide">
                <h2>Alarms</h2>
                <div class="alarms-columns">
                    <div id="alarms-col-left"></div>
                    <div id="alarms-col-right"></div>
                </div>
            </section>
        </div>

        <!-- Row 2: Charts -->
        <section class="panel">
            <h2>Trends</h2>
            <div class="chart-grid">
                <div class="chart-container"><canvas id="chart-pressure"></canvas></div>
                <div class="chart-container"><canvas id="chart-temperature"></canvas></div>
                <div class="chart-container"><canvas id="chart-levels"></canvas></div>
                <div class="chart-container"><canvas id="chart-flows"></canvas></div>
            </div>
        </section>

        <!-- Row 3: XMEAS | XMV | IDV -->
        <div class="row-split-3">
            <section class="panel">
                <h2>Measurements (XMEAS)</h2>
                <table id="xmeas-table" class="signal-table">
                    <thead><tr><th>Tag</th><th>Value</th><th>Unit</th><th>Name</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="panel">
                <h2>Manipulated (XMV)</h2>
                <table id="xmv-table" class="signal-table">
                    <thead><tr><th>Tag</th><th>Value</th><th>Unit</th><th>Name</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="panel">
                <h2>Operator K8s</h2>
                <div id="operator-content">
                    <p class="placeholder">Placeholder — ativado com a issue #44</p>
                </div>
            </section>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
